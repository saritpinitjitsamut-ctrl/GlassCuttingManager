<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dashboard — ภาพรวมปัญหาการขาย</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a202c;
      min-height: 100vh;
      padding: 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 { font-size: 20pt; font-weight: 700; color: #1a202c; }
    .page-header p { font-size: 10.5pt; color: #718096; margin-top: 3px; }

    .btn-refresh {
      background: #2d3748; color: #fff;
      border: none; border-radius: 8px;
      padding: 10px 18px; font-size: 10.5pt;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background: #1a202c; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px 22px;
      border-left: 5px solid #e2e8f0;
    }
    .metric-card.blue  { border-left-color: #3182ce; }
    .metric-card.red   { border-left-color: #e53e3e; }
    .metric-card.amber { border-left-color: #dd6b20; }
    .metric-card.green { border-left-color: #38a169; }

    .metric-label { font-size: 9.5pt; text-transform: uppercase; font-weight: 600; color: #718096; margin-bottom: 6px; }
    .metric-value { font-size: 26pt; font-weight: 700; color: #1a202c; line-height: 1; }
    .metric-sub   { font-size: 9.5pt; color: #a0aec0; margin-top: 5px; }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 700px) { .chart-grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 22px;
    }
    .card-full { margin-bottom: 16px; }
    .card-title {
      font-size: 10.5pt;
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 10pt;
      color: #4a5568;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 10.5pt;
    }
    .status-name { width: 140px; color: #4a5568; font-weight: 500; flex-shrink: 0; }
    .bar-bg { flex: 1; background: #edf2f7; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 10px; border-radius: 4px; transition: width 0.6s ease; }
    .bar-count { width: 40px; text-align: right; font-weight: 700; color: #1a202c; }
    .bar-pct { width: 38px; text-align: right; font-size: 9.5pt; color: #a0aec0; }

    .loading-msg {
      padding: 60px;
      text-align: center;
      font-size: 12pt;
      color: #a0aec0;
      font-weight: 600;
    }

    #note { font-size: 9.5pt; color: #a0aec0; margin-top: 6px; }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>📋 แดชบอร์ดปัญหาการขาย CRM</h1>
    <p id="last-updated">กำลังโหลดข้อมูล...</p>
  </div>
  <button class="btn-refresh" onclick="loadDashboard()">🔄 รีเฟรช</button>
</div>

<div id="dashboard-content">
  <div class="loading-msg">⏳ กำลังดึงข้อมูลจาก Supabase...</div>
</div>

<p id="note"></p>

<script>
  const SUPABASE_URL = 'https://kwvthxxsnazxfgsqoosx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3dnRoeHhzbmF6eGZnc3Fvb3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Nzg5ODUsImV4cCI6MjA5NzA1NDk4NX0.M4Siw9vnUSOdLiSryNp-TkmAVnFCMPjlNnB7ccJxZ0Y';

  const SAMPLE = [
    {problem_type:'สินค้าเสียหาย',severity:'สูง',case_status:'เปิดเคส',issue_date:'2026-06-10'},
    {problem_type:'ลูกค้าตีกลับ',severity:'กลาง',case_status:'ปิดเคสแล้ว',issue_date:'2026-06-11'},
    {problem_type:'สินค้าเสียหาย',severity:'สูง',case_status:'กำลังดำเนินการ',issue_date:'2026-06-11'},
    {problem_type:'ส่งผิดสินค้า',severity:'กลาง',case_status:'เปิดเคส',issue_date:'2026-06-12'},
    {problem_type:'ขอคืนเงิน/เปลี่ยนสินค้า',severity:'ต่ำ',case_status:'ปิดเคสแล้ว',issue_date:'2026-06-12'},
    {problem_type:'ลูกค้าร้องเรียน',severity:'กลาง',case_status:'กำลังดำเนินการ',issue_date:'2026-06-13'},
    {problem_type:'พัสดุสูญหาย',severity:'สูง',case_status:'เปิดเคส',issue_date:'2026-06-13'},
    {problem_type:'ที่อยู่ผิด/หาไม่พบ',severity:'ต่ำ',case_status:'ปิดเคสแล้ว',issue_date:'2026-06-14'},
    {problem_type:'สินค้าเสียหาย',severity:'กลาง',case_status:'เปิดเคส',issue_date:'2026-06-14'},
    {problem_type:'ลูกค้าตีกลับ',severity:'ต่ำ',case_status:'ปิดเคสแล้ว',issue_date:'2026-06-15'},
    {problem_type:'ส่งผิดสินค้า',severity:'สูง',case_status:'กำลังดำเนินการ',issue_date:'2026-06-15'},
    {problem_type:'สินค้าขาด/ไม่ครบ',severity:'กลาง',case_status:'เปิดเคส',issue_date:'2026-06-16'},
  ];

  const TYPE_COLORS = ['#3266ad','#D85A30','#BA7517','#3B6D11','#7F77DD','#0F6E56','#993556','#888780','#E24B4A','#1D9E75'];
  const SEV_COLORS  = { 'สูง':'#E24B4A', 'กลาง':'#EF9F27', 'ต่ำ':'#639922' };
  const STATUS_DEF  = [
    { key:'เปิดเคส',          color:'#E24B4A' },
    { key:'กำลังดำเนินการ',  color:'#EF9F27' },
    { key:'ปิดเคสแล้ว',      color:'#639922' },
  ];

  let chartType, chartSev, chartTrend;

  function count(arr, key) {
    return arr.reduce((acc, r) => {
      const v = (r[key] || 'ไม่ระบุ').replace(/[📦🔄❌↩️🚫📍💬💸🔍🗂️]/gu, '').trim();
      acc[v] = (acc[v] || 0) + 1;
      return acc;
    }, {});
  }

  function buildTrend(data) {
    const today = new Date();
    const days = {};
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      days[d.toISOString().split('T')[0]] = 0;
    }
    data.forEach(r => { if (r.issue_date && days[r.issue_date] !== undefined) days[r.issue_date]++; });
    return days;
  }

  function buildLegend(container, labels, colors) {
    container.innerHTML = '';
    labels.forEach((l, i) => {
      container.innerHTML += `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l}</span>`;
    });
  }

  async function loadDashboard() {
    document.getElementById('dashboard-content').innerHTML = '<div class="loading-msg">⏳ กำลังดึงข้อมูล...</div>';
    document.getElementById('note').textContent = '';

    let data = [];
    let usingSample = false;

    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data: rows, error } = await sb.from('crm_issues').select('problem_type,severity,case_status,issue_date');
      if (!error && rows && rows.length > 0) {
        data = rows;
      } else {
        data = SAMPLE; usingSample = true;
      }
    } catch (e) { data = SAMPLE; usingSample = true; }

    const now = new Date().toLocaleString('th-TH');
    document.getElementById('last-updated').textContent = `อัปเดตล่าสุด: ${now}`;
    if (usingSample) document.getElementById('note').textContent = '⚠️ แสดงข้อมูลตัวอย่าง — สร้างตาราง crm_issues ใน Supabase เพื่อดูข้อมูลจริง';

    const total   = data.length;
    const open    = data.filter(r => r.case_status === 'เปิดเคส').length;
    const inprog  = data.filter(r => r.case_status === 'กำลังดำเนินการ').length;
    const closed  = data.filter(r => r.case_status === 'ปิดเคสแล้ว').length;
    const pct = v => total ? Math.round(v / total * 100) + '%' : '0%';

    const typeCounts = count(data, 'problem_type');
    const typeLabels = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
    const typeVals   = typeLabels.map(k => typeCounts[k]);
    const typeColors = typeLabels.map((_, i) => TYPE_COLORS[i % TYPE_COLORS.length]);

    const sevCounts = count(data, 'severity');
    const sevLabels = ['สูง','กลาง','ต่ำ'].filter(k => sevCounts[k]);
    const sevVals   = sevLabels.map(k => sevCounts[k]);
    const sevColors = sevLabels.map(k => SEV_COLORS[k]);

    const trend      = buildTrend(data);
    const trendDates = Object.keys(trend);
    const trendLabels = trendDates.map(d => { const p = d.split('-'); return p[2]+'/'+p[1]; });
    const trendVals  = Object.values(trend);

    const statusRows = STATUS_DEF.map(s => {
      const v = s.key === 'เปิดเคส' ? open : s.key === 'กำลังดำเนินการ' ? inprog : closed;
      const w = total ? Math.round(v / total * 100) : 0;
      return `<div class="status-row">
        <div class="status-name">${s.key}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:${s.color}"></div></div>
        <div class="bar-count">${v}</div>
        <div class="bar-pct">${w}%</div>
      </div>`;
    }).join('');

    document.getElementById('dashboard-content').innerHTML = `
      <div class="metric-grid">
        <div class="metric-card blue">
          <div class="metric-label">เคสทั้งหมด</div>
          <div class="metric-value">${total}</div>
          <div class="metric-sub">รายการใน CRM</div>
        </div>
        <div class="metric-card red">
          <div class="metric-label">เปิดเคสอยู่</div>
          <div class="metric-value" style="color:#e53e3e">${open}</div>
          <div class="metric-sub">${pct(open)} ของทั้งหมด</div>
        </div>
        <div class="metric-card amber">
          <div class="metric-label">กำลังดำเนินการ</div>
          <div class="metric-value" style="color:#dd6b20">${inprog}</div>
          <div class="metric-sub">${pct(inprog)} ของทั้งหมด</div>
        </div>
        <div class="metric-card green">
          <div class="metric-label">ปิดเคสแล้ว</div>
          <div class="metric-value" style="color:#38a169">${closed}</div>
          <div class="metric-sub">${pct(closed)} ของทั้งหมด</div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <div class="card-title">ประเภทปัญหาที่พบบ่อย</div>
          <div class="legend" id="type-legend"></div>
          <div style="position:relative;height:220px;">
            <canvas id="chart-type" role="img" aria-label="กราฟแท่งประเภทปัญหา"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">ระดับความรุนแรง</div>
          <div class="legend" id="sev-legend"></div>
          <div style="position:relative;height:220px;">
            <canvas id="chart-sev" role="img" aria-label="กราฟวงกลมระดับความรุนแรง"></canvas>
          </div>
        </div>
      </div>

      <div class="card card-full">
        <div class="card-title">สถานะเคส</div>
        ${statusRows}
      </div>

      <div class="card card-full">
        <div class="card-title">จำนวนเคสรายวัน (30 วันล่าสุด)</div>
        <div style="position:relative;height:180px;">
          <canvas id="chart-trend" role="img" aria-label="กราฟเส้นเคสรายวัน"></canvas>
        </div>
      </div>
    `;

    buildLegend(document.getElementById('type-legend'), typeLabels, typeColors);
    buildLegend(document.getElementById('sev-legend'),
      sevLabels.map((l,i) => `${l} — ${sevVals[i]} (${pct(sevVals[i])})`), sevColors);

    if (chartType)  { chartType.destroy(); }
    if (chartSev)   { chartSev.destroy(); }
    if (chartTrend) { chartTrend.destroy(); }

    chartType = new Chart(document.getElementById('chart-type'), {
      type: 'bar',
      data: {
        labels: typeLabels,
        datasets: [{ data: typeVals, backgroundColor: typeColors, borderRadius: 4 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' '+ctx.raw+' เคส' } } },
        scales: {
          x: { ticks: { color:'#718096', font:{size:10} }, grid: { color:'rgba(0,0,0,0.05)' } },
          y: { ticks: { color:'#4a5568', font:{size:10} }, grid: { display: false } }
        }
      }
    });

    chartSev = new Chart(document.getElementById('chart-sev'), {
      type: 'doughnut',
      data: { labels: sevLabels, datasets: [{ data: sevVals, backgroundColor: sevColors, borderWidth: 0, hoverOffset: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' '+ctx.raw+' เคส ('+pct(ctx.raw)+')' } } },
        cutout: '60%'
      }
    });

    chartTrend = new Chart(document.getElementById('chart-trend'), {
      type: 'line',
      data: {
        labels: trendLabels,
        datasets: [{
          data: trendVals,
          borderColor: '#3182ce',
          backgroundColor: 'rgba(49,130,206,0.08)',
          fill: true, tension: 0.4,
          pointRadius: 3,
          pointBackgroundColor: '#3182ce'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color:'#718096', font:{size:10}, maxTicksLimit:10, maxRotation:0 }, grid:{display:false} },
          y: { ticks: { color:'#718096', font:{size:10}, stepSize:1 }, grid:{color:'rgba(0,0,0,0.05)'}, beginAtZero:true }
        }
      }
    });
  }

  window.onload = loadDashboard;
</script>
</body>
</html>
