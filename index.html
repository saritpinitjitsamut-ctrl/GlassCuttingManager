<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glass Cutting Optimizer Pro</title>
<link rel="stylesheet" href="GlassCuttingManager.css">
</head>
<body>

<div class="print-header">
  <div class="print-header-left">
    <strong>✂️ Glass Cutting Optimizer Pro</strong><br>
    <span id="printDateTime"></span>
  </div>
  <div class="print-header-right">ระบบจัดการตัดกระจกอัจฉริยะ</div>
</div>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="app-title">✂️ Glass Cut Pro</div>
      <div class="app-sub">ระบบตัดกระจกอัจฉริยะ</div>
      <div id="thaiClock" class="thai-clock"></div>
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-title">⚙️ แผ่นแม่</div>
      <div class="input-group">
        <label for="sheet">ขนาดกระจกแม่ (นิ้ว)</label>
        <select id="sheet" onchange="loadSizes()">
          <option value="">-- เลือกขนาด --</option>
          <option>84x72</option>
          <option>96x72</option>
          <option>96x84</option>
          <option>120x84</option>
          <option>120x96</option>
        </select>
      </div>
      <div class="row-2">
        <div class="input-group">
          <label for="kerf">Kerf (cm)</label>
          <input id="kerf" type="number" step="0.1" value="0.3">
        </div>
        <div class="input-group" style="display:flex; align-items:flex-end; padding-bottom:2px; gap:6px">
          <input id="allowRotation" type="checkbox" checked style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
          <label for="allowRotation" style="font-size:11px;cursor:pointer;line-height:1.3">อนุญาตหมุนชิ้นงาน</label>
        </div>
      </div>
    </div>

    <!-- Add Piece -->
    <div class="card">
      <div class="card-title">📐 เพิ่มชิ้นงาน</div>

      <div class="input-group">
        <label for="size">เลือกขนาดมาตรฐาน</label>
        <select id="size" onchange="onSelectStdSize()"></select>
      </div>

      <div class="divider-or"><span>หรือ</span></div>

      <div class="input-group">
        <label>ระบุเอง (cm)</label>
        <div class="row-2">
          <input id="customW" type="number" placeholder="กว้าง" min="1" onfocus="this.select()" onkeydown="handleInputKey(event)">
          <input id="customH" type="number" placeholder="สูง" min="1" onfocus="this.select()" onkeydown="handleInputKey(event)">
        </div>
      </div>

      <div class="input-group">
        <label for="qty">จำนวน (ชิ้น)</label>
        <input id="qty" type="number" value="1" min="1" onfocus="this.select()" onkeydown="handleInputKey(event)">
      </div>

      <button class="btn-primary" onclick="addRow()" id="addBtn">
        ➕ เพิ่มรายการ <kbd>Enter</kbd>
      </button>
    </div>

    <!-- Actions -->
    <div class="card">
      <button class="btn-optimize" onclick="optimizeAll()">
        ⚡ คำนวณการตัด
      </button>
      <div class="row-2" style="margin-top:8px">
        <button class="btn-outline" onclick="window.print()">🖨️ พิมพ์</button>
        <button class="btn-danger" onclick="clearAll()">🗑️ ล้าง</button>
      </div>
    </div>

    <div class="sidebar-hint">กด <kbd>Enter</kbd> เพื่อเพิ่มรายการอย่างรวดเร็ว</div>

  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">

    <!-- Job List table -->
    <div class="card" id="jobCard">
      <div class="card-title">
        📝 รายการตัด
        <span id="jobCount" class="count-badge">0 รายการ</span>
      </div>
      <div id="emptyState" class="empty-state">
        <div style="font-size:2rem">🔲</div>
        <div>ยังไม่มีรายการ</div>
        <div style="font-size:11px;opacity:0.6">เพิ่มชิ้นงานจากแผงด้านซ้าย</div>
      </div>
      <div style="overflow-x:auto;" id="tableWrap" style="display:none">
        <table id="jobTable">
          <thead>
            <tr>
              <th>#</th>
              <th>แผ่นแม่</th>
              <th>ขนาด (cm)</th>
              <th style="text-align:center">จำนวน</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>

    <!-- Results area -->
    <div id="resultContainers"></div>

  </main>
</div>

<script src="GlassCuttingManager.js" defer></script>
</body>
</html>
